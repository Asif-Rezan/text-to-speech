services:
  - type: web
    name: text-to-speech
    runtime: python
    plan: starter
    region: oregon
    buildCommand: ./build.sh
    startCommand: python manage.py migrate && gunicorn config.wsgi:application --workers 1 --threads 4 --timeout 600 --bind 0.0.0.0:$PORT
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: text-to-speech.onrender.com
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://text-to-speech.onrender.com
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "1"
      - key: PUBLIC_SITE_URL
        value: https://text-to-speech.onrender.com
      - key: DATABASE_PATH
        value: /var/data/db.sqlite3
      - key: MEDIA_ROOT
        value: /var/data/media
      - key: PIPER_MODEL_DIR
        value: /var/data/models/piper
      - key: PIPER_MODEL_BASE_URL
        value: https://github.com/Asif-Rezan/text-to-speech/releases/latest/download
    disk:
      name: tts-data
      mountPath: /var/data
      sizeGB: 10
