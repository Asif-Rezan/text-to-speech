# fly.toml app configuration file generated for text-to-speech-free on 2026-07-20T05:23:00Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'text-to-speech-free'
primary_region = 'iad'
console_command = '/code/manage.py shell'

[build]

[env]
  PORT = '8000'
  DJANGO_ALLOWED_HOSTS = 'text-to-speech-free.fly.dev'
  DJANGO_CSRF_TRUSTED_ORIGINS = 'https://text-to-speech-free.fly.dev'
  DJANGO_DEBUG = '0'
  PUBLIC_SITE_URL = 'https://text-to-speech-free.fly.dev'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
